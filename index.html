<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>vMix Shortcuts - Control Console</title>
    <style>
        :root { 
            --v-purple: #552583; 
            --v-purple-light: #7b3eb3;
            --v-bg: #050505; 
            --v-card: #121212; 
            --v-border: #2a2a2a; 
            --v-text: #ffffff; 
        }

        html, body {
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background-color: var(--v-bg); font-family: 'Inter', sans-serif; color: var(--v-text);
        }

        body { display: flex; flex-direction: column; align-items: center; }

        .app-shell {
            width: 100%; max-width: 950px; height: 100vh;
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
        }

        .container { 
            background-color: var(--v-card); border: 1px solid var(--v-purple); border-radius: 12px; 
            display: flex; flex-direction: column; flex: 1; min-height: 0;
            box-shadow: 0 10px 40px rgba(85, 37, 131, 0.3); padding: 20px; position: relative;
        }
        
        header { flex-shrink: 0; }
        h1 { color: var(--v-text); font-size: 24px; text-transform: uppercase; text-align: center; margin: 0 0 5px 0; letter-spacing: 2px; font-weight: 900; }
        .subtitle { color: #888; font-size: 11px; text-align: center; display: block; margin-bottom: 15px; border-bottom: 1px solid var(--v-border); padding-bottom: 10px; font-weight: 400; }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; flex-shrink: 0; }
        .tab-btn { 
            background: #1a1a1a; border: 1px solid var(--v-border); color: #aaa; padding: 8px 16px; 
            border-radius: 4px; cursor: pointer; white-space: nowrap; font-size: 11px; font-weight: bold; transition: 0.3s;
        }
        .tab-btn.active { border-color: var(--v-purple-light); color: white; background: var(--v-purple); }

        .grid-viewport { flex: 1; overflow-y: auto; min-height: 0; padding-right: 5px; }
        .function-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; grid-auto-rows: 1fr; }
        
        .func-card { 
            background: #1a1a1a; border: 1px solid var(--v-border); padding: 12px; border-radius: 8px; 
            cursor: pointer; transition: 0.2s; text-align: left; display: flex; flex-direction: column; min-height: 75px;
        }
        .func-card:hover { border-color: var(--v-purple-light); background: #252525; }
        .func-name { color: var(--v-purple-light); font-family: 'Consolas', monospace; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        .func-desc { color: #ccc; font-size: 10px; line-height: 1.4; }

        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(5px); 
        }
        .modal-content { 
            background: var(--v-card); border: 1px solid var(--v-purple); border-radius: 12px; 
            padding: 25px; max-width: 550px; width: 95%; max-height: 85vh; overflow-y: auto; 
        }
        
        .modal-title { color: var(--v-purple-light); font-size: 18px; font-weight: bold; margin-bottom: 12px; font-family: 'Consolas', monospace; border-bottom: 1px solid var(--v-purple); padding-bottom: 8px; text-transform: uppercase; }
        .section-title { color: var(--v-purple-light); font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 15px; display: block; border-left: 3px solid var(--v-purple); padding-left: 8px; margin-bottom: 5px; }
        .section-content { color: #ddd; font-size: 13px; line-height: 1.5; margin-bottom: 12px; text-align: justify; }

        .modal-form { background: #080808; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid var(--v-border); }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 9px; color: var(--v-purple-light); text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
        .modal-form input { width: 100%; background: #1a1a1a; border: 1px solid var(--v-border); padding: 8px; border-radius: 4px; color: #fff; box-sizing: border-box; outline: none; font-size: 13px; }
        
        .modal-buttons { display: flex; gap: 8px; margin-top: 15px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; border: none; transition: 0.2s; }
        .btn-config { background: var(--v-purple); color: #fff; }
        .btn-exit { background: #222; color: #fff; }
        
        .btn-finalizar { background: #1a1a1a; color: #fff; width: 100%; margin-top: 15px; border: 1px solid var(--v-purple); cursor: pointer; padding: 12px; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-size: 11px; }

        .modal-result { background: #000; padding: 12px; border-radius: 4px; border-left: 3px solid var(--v-purple-light); margin-top: 15px; display: none; }
        .res-line { font-family: 'Consolas', monospace; font-size: 11px; margin-bottom: 4px; }
        .res-label { color: var(--v-purple-light); margin-right: 10px; font-weight: bold; }

        footer { text-align: center; padding: 10px; color: #444; font-size: 10px; letter-spacing: 1px; flex-shrink: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--v-purple); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="container">
        <header>
            <h1>vMix Shortcuts</h1>
            <span class="subtitle">Una solución más clara para que elijas la función correcta</span>
            <div id="tabContainer" class="tabs"></div>
        </header>

        <div class="grid-viewport">
            <div id="gridContainer" class="function-grid"></div>
        </div>

        <div id="masterModal" class="modal-overlay">
            <div class="modal-content">
                <div id="infoView">
                    <div class="modal-title" id="mTitle"></div>
                    <div id="mDescription"></div>
                    <div class="modal-buttons">
                        <button class="btn-modal btn-exit" onclick="closeModal()">Cancelar</button>
                        <button class="btn-modal btn-config" onclick="showSetup()">Configurar</button>
                    </div>
                </div>

                <div id="setupView" style="display:none;">
                    <div class="modal-title">Configurar: <span id="sTitle"></span></div>
                    <div class="modal-form">
                        <div id="sInputGroup" class="input-group">
                            <label>Target Input #</label>
                            <input type="text" id="inNum" value="1">
                        </div>
                        <div id="sValueGroup" class="input-group">
                            <label id="sValLabel">Valor</label>
                            <input type="text" id="inVal" placeholder="...">
                        </div>
                        <button class="btn-modal btn-config" onclick="processGen()">Generar Shortcut</button>
                    </div>
                    
                    <div id="mResult" class="modal-result">
                        <div class="res-line"><span class="res-label">FUNCIÓN:</span> <span id="rf"></span></div>
                        <div class="res-line"><span class="res-label">INPUT:</span> <span id="ri"></span></div>
                        <div class="res-line"><span class="res-label">VALOR:</span> <span id="rv"></span></div>
                        <button class="btn-finalizar" onclick="closeModal()">FINALIZAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer>© 2026 Mas4dBu. All rights reserved.</footer>
</div>

let activeFunc = null;

function init() {
    const tabs = document.getElementById('tabContainer');
    Object.keys(DB_ALL).forEach((cat, index) => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
        btn.innerText = cat.toUpperCase();
        btn.onclick = (e) => switchTab(cat, e.target);
        tabs.appendChild(btn);
    });
    switchTab("General", tabs.firstChild);
}

function switchTab(cat, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const grid = document.getElementById('gridContainer');
    grid.innerHTML = '';
    DB_ALL[cat].forEach(item => {
        const card = document.createElement('div');
        card.className = 'func-card';
        card.onclick = () => openModal(item);
        card.innerHTML = `<span class="func-name">${item.name}</span><span class="func-desc">${item.desc}</span>`;
        grid.appendChild(card);
    });
}

function openModal(item) {
    activeFunc = item;
    document.getElementById('mTitle').innerText = item.name;
    document.getElementById('mDescription').innerHTML = `
        <span class="section-title">🔹 ¿QUÉ HACE?</span><div class="section-content">${item.h}</div>
        <span class="section-title">🔹 ¿PARA QUÉ SE USA?</span><div class="section-content">${item.u}</div>
        <span class="section-title">🔹 EJEMPLO REAL</span><div class="section-content">${item.e}</div>
    `;
    document.getElementById('infoView').style.display = 'block';
    document.getElementById('setupView').style.display = 'none';
    document.getElementById('masterModal').style.display = 'flex';
}

function closeModal() { document.getElementById('masterModal').style.display = 'none'; }

function showSetup() {
    document.getElementById('infoView').style.display = 'none';
    document.getElementById('setupView').style.display = 'block';
    document.getElementById('sTitle').innerText = activeFunc.name;
    document.getElementById('mResult').style.display = 'none';
    
    const globals = ["FadeToBlack", "Undo", "ActivatorRefresh", "CallManagerShowHide", "AudioMixerShowHide", "Record", "Streaming", "External2", "Fullscreen", "NDIOnOff", "Output", "ExternalFullscreen", "ReplaySave", "AddInput"];
    const isGlobal = globals.some(g => activeFunc.name.includes(g));
    
    document.getElementById('sInputGroup').style.display = isGlobal ? 'none' : 'block';
    document.getElementById('sValueGroup').style.display = activeFunc.val ? 'block' : 'none';
    if(activeFunc.val) document.getElementById('sValLabel').innerText = activeFunc.val;
}

function processGen() {
    document.getElementById('rf').innerText = activeFunc.name;
    const isInputHidden = document.getElementById('sInputGroup').style.display === 'none';
    document.getElementById('ri').innerText = isInputHidden ? "GLOBAL / AUTO" : (document.getElementById('inNum').value || "1");
    document.getElementById('rv').innerText = activeFunc.val ? (document.getElementById('inVal').value || "Default") : "N/A";
    document.getElementById('mResult').style.display = 'block';
}

window.onload = init;
</script>
